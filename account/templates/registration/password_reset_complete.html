{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - TipiansConnect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --tip-gold:#FFD700; --white:#ffffff; --glass-border: rgba(255, 255, 255, 0.2); }
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Helvetica Neue',sans-serif;
            background:linear-gradient(135deg,#FFD700 0%,#28282B 25%,#343434 50%,#28282B 75%,#FFD700 100%);
            background-size:400% 400%;
            animation:gradientShift 15s ease infinite;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            overflow:hidden;
            color:var(--white);
        }
        @keyframes gradientShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        .bg-decoration{position:absolute;opacity:0.1;pointer-events:none;}
        .circle-1{width:300px;height:300px;background:rgba(255,255,255,0.1);border-radius:50%;top:-100px;left:-100px;animation:float 8s ease-in-out infinite;}
        .circle-2{width:200px;height:200px;background:rgba(255,255,255,0.1);border-radius:50%;bottom:-50px;right:-50px;animation:float 10s ease-in-out infinite 2s;}
        @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(30px);}}
        .container{
            width:100%;
            max-width:900px;
            border-radius:28px;
            overflow:hidden;
            background:rgba(40,40,43,0.75);
            border:1px solid var(--glass-border);
            backdrop-filter:blur(18px);
            box-shadow:0 8px 32px rgba(0,0,0,0.25);
            position:relative;
            z-index:1;
            animation:slideIn 0.8s ease-out;
        }
        @keyframes slideIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
        .header{
            padding:36px 40px;
            border-bottom:2px solid rgba(255,215,0,0.35);
            background:linear-gradient(135deg,rgba(40,40,43,0.8) 0%,rgba(52,52,52,0.8) 100%);
            text-align:center;
        }
        .header h1{font-size:30px;letter-spacing:-0.3px;text-transform:uppercase;}
        .header h1 span{background:linear-gradient(135deg,#FFD700 0%,#fde910 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .content{padding:28px 40px 40px;color:rgba(255,255,255,0.85);line-height:1.8;text-align:center;}
        .content p{margin-bottom:14px;}
        .btn-login{
            display:inline-block;
            margin-top:10px;
            text-decoration:none;
            padding:14px 18px;
            background:linear-gradient(135deg,#FFD700 0%,#e5c100 100%);
            color:#000000;
            border-radius:12px;
            font-weight:900;
            letter-spacing:0.5px;
            text-transform:uppercase;
            box-shadow:0 4px 15px rgba(255,215,0,0.4);
            transition:all 0.3s ease;
        }
        .btn-login:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,215,0,0.5);}
        footer{
            position:absolute;
            bottom:0;left:0;right:0;
            background:rgba(0,0,0,0.5);
            color:var(--tip-gold);
            padding:20px 25px;
            border-top:1px solid rgba(255,215,0,0.2);
            text-align:center;
        }
        footer p{margin-bottom:5px;font-size:0.9em;opacity:0.95;}
    </style>
</head>
<body>
    <div class="bg-decoration circle-1"></div>
    <div class="bg-decoration circle-2"></div>

    <div class="container" role="article" aria-label="Password reset complete">
        <div class="header">
            <h1><span>PASSWORD UPDATED</span></h1>
        </div>
        <div class="content">
            <p>Your password has been set.</p>
            <a class="btn-login" href="{% url 'account:login' %}">Go to Login</a>
        </div>
    </div>

    <footer>
        <p>© {% now "Y" %} {{ config.company_name }}. All rights reserved.</p>
        <p style="font-size: 0.8em; margin-top: 5px;">{{ config.tagline }}</p>
    </footer>
</body>
</html>
