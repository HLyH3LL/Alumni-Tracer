{% extends "base.html" %}
{% load static %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="register-container">
    <h1>Create an Account</h1>
    
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    
    <form method="post" class="register-form">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label for="first_name">First Name:</label>
                <input type="text" name="first_name" id="first_name" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="last_name">Last Name:</label>
                <input type="text" name="last_name" id="last_name" class="form-control" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" class="form-control" required>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="password1">Password:</label>
                <input type="password" name="password1" id="password1" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="password2">Confirm Password:</label>
                <input type="password" name="password2" id="password2" class="form-control" required>
            </div>
        </div>
        
        <!-- Centered button with inline style -->
        <button type="submit" class="btn-primary" style="display: block; width: 200px; margin: 2rem auto 1rem; text-align: center;">Register</button>
    </form>
    
    <!-- Centered login link with inline style -->
    <p class="login-link" style="text-align: center; margin-top: 1.5rem;">Already have an account? <a href="{% url 'account:login' %}">Login here</a></p>
</div>
{% endblock %}
