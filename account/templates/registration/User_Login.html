{% extends 'base.html' %}

{% block content %}

<div style="width:400px; margin:80px auto;">

<h2>Login</h2>

<form method="POST">
    {% csrf_token %}

```
<label>Username</label><br>
{{ form.username }}<br><br>

<label>Password</label><br>
{{ form.password }}<br><br>

<button type="submit">Login</button>
```

</form>

<p style="margin-top:15px;">
Don't have an account?
<a href="{% url 'register' %}">Register</a>
</p>

</div>

{% endblock %}
