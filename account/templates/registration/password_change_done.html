{% extends "base.html" %}
{% block content %}

<style>
    .form-wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 100px;
    }

    .form-container {
        width: 100%;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1.5px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        padding: 60px 40px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
        animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .form-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, 
            transparent 0%, 
            var(--tip-matte-black) 20%, 
            var(--tip-gold) 50%, 
            var(--tip-matte-black) 80%, 
            transparent 100%);
    }

    @keyframes slideUp {
        from {
            transform: translateY(40px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .form-container h2 {
        font-size: 2em;
        font-weight: 700;
        color: var(--white);
        margin-bottom: 16px;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, var(--white) 0%, var(--gray-light) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: fadeInDown 0.8s ease-out 0.1s both;
    }

    @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .form-container p {
        font-size: 1.05em;
        color: var(--gray-light);
        margin-bottom: 40px;
        line-height: 1.6;
        opacity: 0.9;
        animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .form-container a {
        display: inline-block;
        padding: 14px 24px;
        background: linear-gradient(135deg, var(--tip-gold) 0%, var(--tip-gold-dark) 100%);
        color: var(--tip-matte-black);
        border: 2px solid rgba(255, 215, 0, 0.4);
        border-radius: 10px;
        font-size: 0.95em;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition-smooth);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        box-shadow: 0 8px 32px rgba(255, 215, 0, 0.25);
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-decoration: none;
    }

    .form-container a:hover {
        transform: translateY(-3px);
        box-shadow: 
            0 12px 40px rgba(255, 215, 0, 0.35),
            inset 0 1px 0 rgba(255, 255, 255, 0.3);
        background: linear-gradient(135deg, var(--tip-gold-light) 0%, var(--tip-gold) 100%);
    }

    .form-container a:active {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(255, 215, 0, 0.2);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .form-container {
            padding: 48px 32px;
            border-radius: 16px;
        }

        .form-container h2 {
            font-size: 1.6em;
            margin-bottom: 12px;
        }

        .form-container p {
            font-size: 0.95em;
            margin-bottom: 32px;
        }

        .form-container a {
            padding: 12px 32px;
            font-size: 0.9em;
        }
    }

    @media (max-width: 480px) {
        .form-wrapper {
            padding: 16px;
        }

        .form-container {
            padding: 40px 24px;
            border-radius: 16px;
        }

        .form-container h2 {
            font-size: 1.4em;
            margin-bottom: 12px;
        }

        .form-container p {
            font-size: 0.9em;
            margin-bottom: 28px;
        }

        .form-container a {
            padding: 11px 28px;
            font-size: 0.85em;
            width: 100%;
        }

        body::before {
            width: 400px;
            height: 400px;
        }

        body::after {
            width: 300px;
            height: 300px;
        }
    }
</style>

<div class="form-wrapper">
    <div class="form-container">
        <h2>Password Changed Successfully</h2>
        <p>Your password has been updated. You can now use your new password to log in.</p>
        <a class="btn btn-primary" href="{% url 'account:alumni_dashboard' %}">Return to Dashboard</a>
    </div>
</div>

{% endblock %}
