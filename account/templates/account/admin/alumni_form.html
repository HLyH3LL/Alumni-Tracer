{% extends "account/admin/_layout.html" %}

{% block content %}
<div class="title">{{ title }}</div>

<div class="card" style="max-width:720px;">
  <form method="post" novalidate>
    {% csrf_token %}
    {{ form.non_field_errors }}

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      {% for field in form %}
        <div style="display:flex; flex-direction:column; margin-bottom:10px;">
          <label for="{{ field.id_for_label }}" style="margin-bottom:4px; color:#ffd700;">{{ field.label }}</label>
          {{ field }}
          <div style="color:#ffb6b6; font-size:0.9em;">{{ field.errors }}</div>
        </div>
      {% endfor %}
    </div>

    <button type="submit" class="btn-action" style="margin-top:10px; background:#ffd700; color:#000;">Save</button>
    <a href="{% url 'account:alumni_records' %}" class="btn-action" style="margin-top:10px; background:#222; color:#ffd700;">Cancel</a>
  </form>
</div>
{% endblock %}
