{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- make CSRF available to JS -->
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Admin Login - T.I.P.ians Connect</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
      :root {
          --tip-matte-black: #28282B;
          --tip-pure-black: #000000;
          --tip-jet-black: #343434;
          --tip-gold: #FFD700;
          --tip-gold-dark: #e5c100;
          --tip-gold-light: #fde910;
          --white: #ffffff;
      }

      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
          background: linear-gradient(135deg, #FFD700 0%, #28282B 25%, #343434 50%, #28282B 75%, #FFD700 100%);
          background-size: 400% 400%;
          animation: gradientShift 15s ease infinite;
          background-attachment: fixed;
          color: var(--white);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          position: relative;
          overflow-x: hidden;
      }

      @keyframes gradientShift {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
      }

      body::before {
          content: '';
          position: absolute;
          top: -50%;
          left: -50%;
          width: 200%;
          height: 200%;
          background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
          animation: rotate 20s linear infinite;
          pointer-events: none;
      }

      @keyframes rotate {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
      }

      .login-container {
          background: linear-gradient(145deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
          backdrop-filter: blur(20px);
          border: 1px solid rgba(255, 255, 255, 0.18);
          border-radius: 20px;
          box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
          padding: 50px;
          width: 100%;
          max-width: 450px;
          position: relative;
          z-index: 1;
          animation: slideUp 0.8s ease-out;
      }

      @keyframes slideUp {
          from { opacity: 0; transform: translateY(50px); }
          to { opacity: 1; transform: translateY(0); }
      }

      .logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  text-align: center;
}
 
 
.logo img {
  width: 50px;
  height: 50px;
  object-fit: contain;
  display: block;
  margin-bottom: 15px;
}
 
.logo span {
  color: var(--white);
  letter-spacing: 0.5px;
  font-size: 1.1em;
  font-weight: 700;
  margin-top: 15px;
}


.login-title {
  font-size: 2.5em;
  font-weight: 900;
  color: var(--white);
  margin: 0;
  padding: 0;
  line-height: 1.2;
}
 
.login-subtitle {
  font-size: 1.1em;
  color: rgba(255, 255, 255, 0.8);
  margin: 10px 0 0 0;
  padding: 0;
  line-height: 1.4;
  max-width: 350px;
}
 

      .form-group {
          margin-bottom: 25px;
      }

      .form-group label {
          display: block;
          font-weight: 600;
          color: rgba(255, 255, 255, 0.9);
          margin-bottom: 8px;
          font-size: 0.95em;
      }

      .form-group label i {
          color: var(--tip-gold);
          margin-right: 8px;
      }

      .form-control {
          width: 100%;
          background: rgba(255, 255, 255, 0.12);
          border: 1px solid rgba(255, 255, 255, 0.18);
          backdrop-filter: blur(10px);
          padding: 15px 18px;
          border-radius: 12px;
          font-size: 1em;
          color: var(--white);
          font-family: inherit;
          transition: all 0.3s ease;
      }

      .form-control::placeholder {
          color: rgba(255, 255, 255, 0.4);
      }

      .form-control:focus {
          outline: none;
          background: rgba(255, 255, 255, 0.18);
          border-color: rgba(255, 215, 0, 0.5);
          box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
          color: var(--white);
      }

      .btn {
          width: 100%;
          padding: 16px;
          border-radius: 12px;
          border: none;
          font-weight: 700;
          font-size: 1em;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          cursor: pointer;
          transition: all 0.3s ease;
          margin-bottom: 15px;
      }

      .btn-primary {
          background: linear-gradient(135deg, var(--tip-gold) 0%, var(--tip-gold-dark) 100%);
          color: var(--tip-matte-black);
          box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
      }

      .btn-primary:hover {
          transform: translateY(-3px);
          box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
      }

      .btn-secondary {
          background: rgba(255, 255, 255, 0.12);
          color: var(--white);
          border: 1px solid rgba(255, 255, 255, 0.18);
          backdrop-filter: blur(10px);
      }

      .btn-secondary:hover {
          background: rgba(255, 255, 255, 0.18);
          border-color: rgba(255, 215, 0, 0.3);
          transform: translateY(-2px);
      }

      .divider {
          text-align: center;
          margin: 25px 0;
          position: relative;
      }

      .divider::before {
          content: '';
          position: absolute;
          top: 50%;
          left: 0;
          right: 0;
          height: 1px;
          background: rgba(255, 255, 255, 0.2);
      }

      .divider span {
          background: linear-gradient(135deg, #28282B, #343434);
          padding: 0 15px;
          color: rgba(255, 255, 255, 0.6);
          font-size: 0.9em;
          position: relative;
          z-index: 1;
      }

      .back-link {
          text-align: center;
          margin-top: 20px;
      }

      .back-link a {
          color: var(--tip-gold);
          text-decoration: none;
          font-weight: 600;
          transition: color 0.3s ease;
      }

      .back-link a:hover {
          color: var(--tip-gold-light);
      }

      /* Responsive */
      @media (max-width: 480px) {
          .login-container {
              margin: 20px;
              padding: 30px;
          }

          .login-title {
              font-size: 2em;
          }

          .logo {
              width: 60px;
              height: 60px;
          }
      }
  </style>
</head>
<body>

<div class="login-container">

    <div class="logo">
        <img src="{{ config.logo_main.url }}" alt="Site Logo">
        <h1 class="login-title">Admin Login</h1>
        <p class="login-subtitle">Access the administrative dashboard</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="username"><i class="fas fa-user"></i> Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Enter your admin username" required>
        </div>

        <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary">
            <i class="fas fa-sign-in-alt"></i> Login to Dashboard
        </button>
    </form>

    <div class="divider">
        <span>Feature</span>
    </div>

    <button class="btn btn-secondary" onclick="startFaceLogin()">
        <i class="fas fa-camera"></i> Login with Face Recognition
    </button>

    <div id="face-login-box" style="display:none; margin-top:20px;">
    <video id="video" width="320" height="240" autoplay muted></video>
    <p id="face-status">Initializing...</p>
</div>



    <div class="back-link">
        <a href="{% url 'account:home' %}">
        </a>
    </div>
</div>

<!-- load UMD browser bundle only (remove unpkg build) -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
// read CSRF token reliably from meta
function getCSRFToken() {
    const m = document.querySelector('meta[name="csrf-token"]');
    return m ? m.getAttribute('content') : '';
}

 const MODEL_URL = "{% static 'face-api-models' %}/";
 
 async function saveMyFace() {
     if (typeof faceapi === 'undefined') {
         alert('Face API not loaded');
         return;
     }
     const video = document.getElementById("video");
    // use the tiny detector (matches what you load) to avoid requiring ssdMobilenetv1
    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
     if (!detection) { alert("No face detected"); return; }
     const descriptor = Array.from(detection.descriptor);
     const saveRes = await fetch("{% url 'account:save_face' %}", {
        method: "POST",
        credentials: "same-origin",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ face: descriptor })
    });
    if (!saveRes.ok) {
        console.error('save-face http', saveRes.status, await saveRes.text());
        alert('Failed to save face');
        return;
    }
     alert("Face saved!");
 }
 
 async function startFaceLogin() {
     if (typeof faceapi === 'undefined') {
         document.getElementById("face-status").innerText = "Face API not loaded";
         console.error("faceapi is undefined");
         return;
     }
     document.getElementById("face-login-box").style.display = "block";
     document.getElementById("face-status").innerText = "Loading models...";
     try {
         await Promise.all([
             faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
             faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
             faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
         ]);
         document.getElementById("face-status").innerText = "Models loaded ✅";
     } catch (err) {
         console.error(err);
         document.getElementById("face-status").innerText = "Failed to load models ❌";
         return;
     }

     document.getElementById("face-status").innerText = "Starting camera...";
     const video = document.getElementById("video");
     try {
         const stream = await navigator.mediaDevices.getUserMedia({ video: true });
         video.srcObject = stream;
     } catch (err) {
         document.getElementById("face-status").innerText = "Camera access denied ❌";
         return;
     }

     video.addEventListener("play", () => {
         document.getElementById("face-status").innerText = "Scanning face...";
         const interval = setInterval(async () => {
             // make sure the tiny detector is used consistently
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
             if (!detection) { document.getElementById("face-status").innerText = "No face detected"; return; }
             document.getElementById("face-status").innerText = "Face detected, verifying...";
             const descriptor = Array.from(detection.descriptor);
             const res = await fetch("{% url 'account:face_login' %}", {
                method: "POST",
                credentials: "same-origin",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCSRFToken()
                },
                body: JSON.stringify({ face: descriptor })
            });
            if (!res.ok) {
                console.error('face-login http', res.status, await res.text());
                document.getElementById("face-status").innerText = "Server error";
                return;
            }
            const data = await res.json();
             if (data.success) {
                 clearInterval(interval);
                 document.getElementById("face-status").innerText = "Access Granted ✅";
                 //                window.location.href = "/admin-dashboard/";
                // use Django reverse so the URL matches your app namespace
                window.location.href = "{% url 'account:admin_dashboard' %}";
             } else {
                 document.getElementById("face-status").innerText = "Not recognized";
             }
         }, 2000);
     }, { once: true });
 }
</script>

</body>
</html>
