{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TipiansConnect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --tip-matte-black: #28282B;
            --tip-jet-black: #343434;
            --tip-gold: #FFD700;
            --tip-gold-dark: #e5c100;
            --tip-gold-light: #fde910;
            --white: #ffffff;
            --light-text: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.2);
            --error-color: #ff6b6b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #FFD700 0%, #28282B 25%, #343434 50%, #28282B 75%, #FFD700 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            color: var(--light-text);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-decoration {
            position: absolute;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
            animation: float 10s ease-in-out infinite 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        .container {
            width: 420px;
            padding: 42px 36px;
            border-radius: 24px;
            background: rgba(40, 40, 43, 0.75);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(18px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 1;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 30px;
            letter-spacing: -0.3px;
            text-transform: uppercase;
        }

        .form-subtitle {
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 0.3px;
            margin-bottom: 26px;
        }

        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 12px;
            font-size: 14px;
            color: var(--light-text);
            font-family: inherit;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .form-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FFD700 0%, #e5c100 100%);
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
        }

        .btn-login:hover::before { left: 100%; }
        .btn-login:active { transform: translateY(0); }

        .face-btn {
            width: 100%;
            margin-top: 14px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .face-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 215, 0, 0.35);
            color: var(--white);
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .container { width: 92vw; padding: 36px 22px; border-radius: 18px; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration circle-1"></div>
    <div class="bg-decoration circle-2"></div>

    <div class="container">
        <h2>ADMIN LOGIN</h2>
        <div class="form-subtitle">Manage alumni accounts</div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="id_username">Username</label>
                <input class="form-input" id="id_username" type="text" name="username" placeholder="Enter Username" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="id_password">Password</label>
                <input class="form-input" id="id_password" type="password" name="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="btn-login">LOGIN</button>
        </form>

        <!-- Future Face Recognition -->
        <button class="face-btn" type="button" onclick="startFaceLogin()">
            Login with Face Recognition
        </button>
    </div>

    <script>
        function startFaceLogin() {
            alert("Face Recognition Coming Soon");
        }
    </script>
</body>
</html>
