{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Admin{% endblock %}</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background: #000;
      color:#ffffff;
    }

    .topbar{
      height:64px;
      background: #000;
      color:#ffd700;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      box-shadow:0 10px 24px rgba(0,0,0,.55);
      border-bottom: 3px solid #ffd700;
    }

    .brand{
      display: flex;
      align-items:center;
      gap: 10px;
      font-weight:800;
      font-size: 1.1rem;
      letter-spacing: .35px;
      color: #ffd700;
      text-shadow: 0 0 8px rgba(255,215,0,0.4);
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.8));
    }

    .user-label {
      font-weight:700;
      color:#fff;
      background: rgba(255,255,255,0.1);
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,215,0,0.7);
      box-shadow: 0 0 12px rgba(255,215,0,0.25);
    }

    .wrap{
      display:flex;
      min-height:calc(100vh - 64px);
    }

    /* ===== SIDEBAR ===== */
    .sidebar{
      width:250px;
      background: #000;
      display:flex;
      flex-direction:column;
      padding-top:10px;
      border-right: 2px solid #ffd700;
    }

    .sidebar a{
      display:block;
      padding:14px 20px;
      color:#fff;
      text-decoration:none;
      font-weight:600;
      border-left:4px solid transparent;
      transition:all 0.2s ease;
    }

    .sidebar a:hover{
      background: rgba(255, 215, 0, 0.18);
      color: #000;
      border-left:4px solid #ffd700;
    }

    .sidebar a.active{
      background: rgba(255, 215, 0, 0.26);
      color: #000;
      border-left:4px solid #ffd700;
    }

    /* ===== CONTENT ===== */
    .content{
      flex:1;
      padding:22px;
    }

    .title{
      font-size:34px;
      font-weight:900;
      margin:6px 0 18px;
      color:#ffd700;
    }

    .grid{
      display:grid;
      grid-template-columns: 340px 1fr 1fr;
      gap:16px;
    }

    .card{
      background: #111;
      border: 1px solid rgba(255, 215, 0, 0.5);
      box-shadow: 0 8px 24px rgba(0,0,0,.45);
      color: #fff;
    }

    table{
      background: #111;
      border: 1px solid rgba(255, 215, 0, 0.5);
      box-shadow: 0 8px 24px rgba(0,0,0,.45);
    }

    th, td{
      color: #fff;
    }

    .card{
      background:#111;
      border-radius:14px;
      padding:16px;
      box-shadow:0 10px 26px rgba(0,0,0,.45);
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#111;
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 10px 26px rgba(0,0,0,.45);
    }

    th, td{
      padding:12px;
      border-bottom:1px solid rgba(255,255,255,0.1);
      text-align:left;
    }

    th{
      background: rgba(255,215,0,0.2);
      color: #000;
      font-weight:800;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="brand">
      <img class="brand-logo" src="{% static 'images/logo.svg' %}" alt="TIP Alumni Logo" />
      <span>T.I.P.ians Connect</span>
    </div>
    <div class="user-label">{{ request.user.username }}</div>
  </div>

  <div class="wrap">

    <!-- ✅ FIXED SIDEBAR -->
    <aside class="sidebar">
      <a href="{% url 'account:admin_dashboard' %}">Dashboard</a>
      <a href="{% url 'account:alumni_records' %}">Alumni Records</a>
      <a href="{% url 'account:profile_verification' %}">Profile Verification</a>
      <a href="{% url 'account:reports' %}">Reports</a>
      <a href="{% url 'account:user_management' %}">User Management</a>
      <a href="{% url 'account:admin_settings' %}">Settings</a>
      <a href="{% url 'account:logout' %}">Logout</a>
    </aside>

    <main class="content">
      {% block content %}{% endblock %}
    </main>

  </div>

</body>
</html>
